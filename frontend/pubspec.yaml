name: campus_connect
description: Campus Connect - AI-powered grievance management system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # HTTP Client
  dio: ^5.4.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.4
  cloud_firestore: ^5.4.3

  # Maps (Leaflet alternative for Flutter)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Image Picker
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  path: ^1.9.0

  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.0.1

  # Storage
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  path_provider: ^2.1.1
  
  # Navigation
  go_router: ^12.1.3

  # Splash Screen
  flutter_native_splash: ^2.3.10

  # Local Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#2196F3"
  image: assets/images/app_icon.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#2196F3"
    image: assets/images/app_icon.png

